services:
  postgres-backup:
    image: ghcr.io/quyendv/postgresql-backup:latest
    container_name: postgres-backup
    build:
      context: .
      args:
        PG_VERSION: "16"
    env_file:
      - .env
    # SCHEDULE uses standard cron syntax. Examples:
    #   "0 */4 * * *"  — every 4 hours
    #   "0 2 * * *"    — daily at 02:00
    #   "@every 6h"    — every 6 hours (supercronic extension)
    # Leave empty (or omit) to run once and exit.
    environment:
      SCHEDULE: "0 */4 * * *"
    volumes:
      - backup_data:/backup
    restart: unless-stopped

volumes:
  backup_data:
    driver: local
