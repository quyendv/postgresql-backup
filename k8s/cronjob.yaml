apiVersion: v1
kind: Secret
metadata:
  namespace: bi-db
  name: postgresql-backup-secret
type: Opaque
stringData:
  POSTGRES_HOST: ""
  POSTGRES_PORT: "5432"
  POSTGRES_USER: ""
  POSTGRES_PASSWORD: ""
  POSTGRES_DB: ""
  S3_ACCESS_KEY: ""
  S3_SECRET_KEY: ""
  S3_ENDPOINT: ""
  S3_BUCKET: ""
  S3_REGION: "us-east-1"
  S3_PATH: "backups/postgres"
  TTL_DAYS: "7"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  namespace: bi-db
  name: postgresql-backup
spec:
  schedule: "0 */4 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: postgresql-backup
              image: ghcr.io/quyendv/postgresql-backup:pg16
              envFrom:
                - secretRef:
                    name: postgresql-backup-secret
          restartPolicy: OnFailure
